<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="bVmFgczGXnDrzsYVS1j2PsvgxYcemKb7BFhtfiT2SIM" />
    <title>Helldivers 2 Randomizer</title>
    <link rel="icon" type="image/png" href="https://sw6.elbenwald.de/media/59/80/32/1720565693/E1083906_2.jpg">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #f0f0f0; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #ffe800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 1.8rem; }
        .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; font-style: italic; }
        
        .container { max-width: 1100px; margin: 0 auto; background: #2d2d2d; padding: 15px; border-radius: 10px; border: 2px solid #ffe800; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .toggle-header {
            background: #333;
            color: #ffe800;
            padding: 15px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ffe800;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            margin-bottom: 10px;
        }
        .toggle-header:hover { background: #444; }
        .arrow { transition: transform 0.3s ease; }
        .collapsed .arrow { transform: rotate(-90deg); }
        
        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            max-height: 2000px; 
        }
        .collapsible-content.hidden {
            max-height: 0;
            opacity: 0;
        }

        .options { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; text-align: left; margin-bottom: 20px; padding: 10px; border: 1px solid #444; background: #222; }
        label { cursor: pointer; background: #333; padding: 6px 10px; border-radius: 4px; display: flex; align-items: center; user-select: none; font-size: 0.85rem; border: 1px solid transparent; transition: 0.2s; color: #ddd; }
        label:hover { background: #444; border-color: #555; }
        
        input[type="checkbox"] { 
            appearance: none;           
            -webkit-appearance: none;   
            width: 20px;
            height: 20px;
            background-color: #222;
            border: 2px solid #555;
            border-radius: 3px;
            margin-right: 10px;
            cursor: pointer;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            vertical-align: middle;
            transition: 0.1s ease-in-out;
        }

        input[type="checkbox"]:hover {
            border-color: #ffe800;
        }

        input[type="checkbox"]:checked {
            background-color: #ffe800;
            border-color: #ffe800;
        }

        input[type="checkbox"]:checked::after {
            content: '✔';
            font-size: 14px;
            color: #000;
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .settings-bar {
            margin: 0 !important; 
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: 100%;
            max-width: 350px;
        }

        .settings-label {
            color: #ffe800;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button.deploy-btn {margin: 0 !important; background-color: #ffe800; color: #000; font-size: 1.5rem; font-weight: 900; padding: 15px 50px; border: none; cursor: pointer; text-transform: uppercase; clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px); transition: transform 0.1s; box-shadow: 0 5px 0 #b3a200; margin: 10px 0 20px 0; width: 100%; max-width: 400px; }
        button.deploy-btn:active { transform: scale(0.98) translateY(2px); box-shadow: 0 2px 0 #b3a200; }

        .action-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .result-container {
            display: none;
            border-top: 2px solid #444;
            padding-top: 20px;
            animation: fadeIn 0.4s ease-in;
        }

        .layout-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .col-equipment, .col-stratagems {
            flex: 1;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        h3 { margin-top: 0; border-bottom: 2px solid #ffe800; padding-bottom: 5px; color: #fff; text-align: left; }

        .slot { background: #000; padding: 8px; margin-bottom: 8px; border-left: 4px solid #ffe800; display: flex; align-items: center; gap: 10px; }
        
        .weapon-img { 
            width: 180px; height: 101px; 
            object-fit: contain; background: #151515; 
            border: 1px solid #333; border-radius: 4px; flex-shrink: 0; 
        }

        .strat-icon { 
            width: 101px; height: 101px; 
            object-fit: contain; background: #151515; 
            border: 1px solid #333; border-radius: 4px; flex-shrink: 0; 
        }

        .slot-content { display: flex; flex-direction: column; width: 100%; text-align: left; }
        .slot-title { font-weight: bold; color: #888; font-size: 0.7em; text-transform: uppercase; margin-bottom: 2px; }
        .slot-item { font-size: 1em; color: #fff; font-weight: bold; text-shadow: 0 0 5px rgba(255, 232, 0, 0.2); }
        
        .stratagem-grid { display: grid; grid-template-columns: 1fr; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .layout-row { flex-direction: column; }
            .col-equipment, .col-stratagems { width: 100%; box-sizing: border-box; }
            .container { padding: 10px; }
            .weapon-img { width: 100px; height: 50px; }
            h1 { font-size: 1.4rem; }
        }

        .gallery-modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .gallery-close {
            position: fixed; top: 20px; right: 30px;
            font-size: 40px; color: #fff; cursor: pointer;
            font-weight: bold; background: none; border: none;
            z-index: 10000;
        }
        .gallery-close:hover { color: #ffe800; }

        .gallery-category {
            color: #ffe800; border-bottom: 2px solid #ffe800;
            margin: 30px 0 15px 0; padding-bottom: 5px;
            text-transform: uppercase; letter-spacing: 2px;
            width: 100%; text-align: left;
        }

        .gallery-grid {
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
        }

        .gallery-item {
            width: 140px; background: #222; border: 1px solid #444;
            padding: 10px; border-radius: 5px;
            display: flex; flex-direction: column; align-items: center;
            transition: 0.2s;
        }

        .gallery-item img {
            width: 100px; height: 100px; object-fit: contain;
            margin-bottom: 10px; background: #000;
        }

        .gallery-item span {
            font-size: 0.75rem; color: #ccc; word-wrap: break-word; width: 100%;
        }

        .gallery-item.error {
            border: 3px solid #ff0000;
            background: #520000;
            order: -1;
        }
        .gallery-item.error span { color: #ffcccc; font-weight: bold; }
    </style>
</head>

            header.classList.remove('collapsed');
        } else {
            content.classList.add('hidden');
            header.classList.add('collapsed');

            { name: "AX/FLAM-75 'Guard Dog' Hot Dog", tags: ["python", "backpack"], icon: "https://helldivers.wiki.gg/images/Hot_Dog_Stratagem_Icon.svg?6c3756" },
            { name: "CQC-9 Defoliation Tool", tags: ["python", "supportweapon"], icon: "https://helldivers.wiki.gg/images/Defoliation_Tool_Stratagem_Icon.svg?fdfafd" },
            { name: "M-1000 Maxigun", tags: ["python", "backpack", "supportweapon"], icon: "https://helldivers.wiki.gg/images/Maxigun_Stratagem_Icon.svg?482208" },
            { name: "B/MD C4 Pack", tags: ["redacted", "backpack"], icon: "https://helldivers.wiki.gg/images/C4_Pack_Stratagem_Icon.svg?b416af" },
            { name: "CQC-20 Breaching Hammer", tags: ["siege", "supportweapon"], icon: "https://helldivers.wiki.gg/images/Breaching_Hammer_Stratagem_Icon.svg?a09cd2" },
            { name: "EAT-411 Leveller", tags: ["siege"], icon: "https://helldivers.wiki.gg/images/EAT-411_Leveller_Stratagem_Icon.png?124942" },
            { name: "GL-28 Belt-fed Grenade Launcher", tags: ["siege", "backpack", "supportweapon"], icon: "https://helldivers.wiki.gg/images/Belt-Fed_Grenade_Launcher_Stratagem_Icon.svg?e2f990" }
        ]
    };

    function generateLoadout() {
        try {
            const activeTags = ["base"];

            if(document.getElementById('wb-steeled').checked) activeTags.push("steeled");
            if(document.getElementById('wb-cutting').checked) activeTags.push("cutting");
            if(document.getElementById('wb-democratic').checked) activeTags.push("democratic");
            if(document.getElementById('wb-polar').checked) activeTags.push("polar");
            if(document.getElementById('wb-viper').checked) activeTags.push("viper");
            if(document.getElementById('wb-freedom').checked) activeTags.push("freedom");
            if(document.getElementById('wb-chemical').checked) activeTags.push("chemical");
            if(document.getElementById('wb-truth').checked) activeTags.push("truth");
            if(document.getElementById('wb-urban').checked) activeTags.push("urban");
            if(document.getElementById('wb-servants').checked) activeTags.push("servants");
            if(document.getElementById('wb-justice').checked) activeTags.push("borderline"); 
            if(document.getElementById('wb-ceremony').checked) activeTags.push("masters");
            if(document.getElementById('wb-law').checked) activeTags.push("force");
            if(document.getElementById('wb-control').checked) activeTags.push("control");
            if(document.getElementById('wb-dust').checked) activeTags.push("dust");
            if(document.getElementById('wb-python').checked) activeTags.push("python");
            if(document.getElementById('wb-redacted').checked) activeTags.push("redacted");
            if(document.getElementById('wb-halo').checked) activeTags.push("halo");
            if(document.getElementById('wb-killzone').checked) activeTags.push("killzone");
            if(document.getElementById('wb-siege').checked) activeTags.push("siege");

            const limitBackpack = document.getElementById('chk-backpack').checked;
            const limitSupport = document.getElementById('chk-support').checked;

            function getRandomItem(category) {
                const filtered = data[category].filter(item => 
                    item.tags.some(tag => activeTags.includes(tag))
                );
                if (!filtered || filtered.length === 0) return { name: "N/A", icon: defaultIcon };
                
                const chosen = filtered[Math.floor(Math.random() * filtered.length)];
                return {
                    name: chosen.name,
                    icon: chosen.icon || defaultIcon
                };
            }

            function getStratagems() {
                let allAvailable = data.stratagems.filter(item => 
                    item.tags.some(tag => activeTags.includes(tag))
                );

                for (let i = allAvailable.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allAvailable[i], allAvailable[j]] = [allAvailable[j], allAvailable[i]];
                }

                const result = [];
                let hasBackpack = false;
                let hasSupport = false;

                for (const item of allAvailable) {
                    if (result.length >= 4) break;

                    const isBackpack = item.tags.includes("backpack");
                    const isSupport = item.tags.includes("supportweapon");

                    let skipItem = false;

                    if (limitBackpack && isBackpack && hasBackpack) {
                        skipItem = true;
                    }

                    if (limitSupport && isSupport && hasSupport) {
                        skipItem = true;
                    }

                    if (!skipItem) {
                        result.push(item);
                        if (isBackpack) hasBackpack = true;
                        if (isSupport) hasSupport = true;
                    }
                }
                
                return result.map(i => ({ name: i.name, icon: i.icon || defaultIcon }));
            }

            const prim = getRandomItem('primary');
            document.getElementById('res-primary').innerText = prim.name;
            document.getElementById('img-primary').src = prim.icon;

            const sec = getRandomItem('secondary');
            document.getElementById('res-secondary').innerText = sec.name;
            document.getElementById('img-secondary').src = sec.icon;

            const gren = getRandomItem('grenade');
            document.getElementById('res-grenade').innerText = gren.name;
            document.getElementById('img-grenade').src = gren.icon;

            const boost = getRandomItem('booster');
            document.getElementById('res-booster').innerText = boost.name;
            document.getElementById('img-booster').src = boost.icon;

            const strats = getStratagems();
            
            for(let i=0; i<4; i++) {
                const s = strats[i];
                const elName = document.getElementById('res-s' + (i+1));
                const elImg = document.getElementById('img-s' + (i+1));
                
                if(s) {
                    elName.innerText = s.name;
                    elImg.src = s.icon;
                } else {
                    elName.innerText = "-";
                    elImg.src = defaultIcon;
                }
            }

            document.getElementById('results').style.display = "block";
            
        } catch (error) {
            alert("Rendszerhiba: " + error.message);
            console.error(error);
        }
    }

    function checkAllImages() {
        const modal = document.getElementById('image-gallery');
        const content = document.getElementById('gallery-content');
        
        content.innerHTML = "";
        modal.style.display = "block";

        const categories = ['primary', 'secondary', 'grenade', 'booster', 'stratagems'];

        categories.forEach(cat => {
            if (!data[cat]) return;

            const title = document.createElement('h2');
            title.className = 'gallery-category';
            title.innerText = cat.toUpperCase();
            content.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'gallery-grid';

            data[cat].forEach(item => {
                const card = document.createElement('div');
                card.className = 'gallery-item';

                const nameSpan = document.createElement('span');
                nameSpan.innerText = item.name;

                const img = document.createElement('img');
                
                if (item.icon && item.icon.length > 5) {
                    img.src = item.icon;
                } else {
                    img.src = defaultIcon;
                }

                img.onerror = function() {
                    card.classList.add('error');
                    nameSpan.innerText = "⚠️ HIBÁS: " + item.name;
                    img.src = "https://cdn-icons-png.flaticon.com/512/564/564619.png";
                };

                card.appendChild(img);
                card.appendChild(nameSpan);
                grid.appendChild(card);
            });

            content.appendChild(grid);
        });
    }

    function closeGallery() {
        document.getElementById('image-gallery').style.display = "none";
    }

    (function preloadAllImages() {
        const categories = ['primary', 'secondary', 'grenade', 'booster', 'stratagems'];
        const urlsToLoad = new Set();

        categories.forEach(cat => {
            if(data[cat]) {
                data[cat].forEach(item => {
                    if (item.icon && item.icon.startsWith('http')) {
                        urlsToLoad.add(item.icon);
                    }
                });
            }
        });

        urlsToLoad.add(defaultIcon);

        console.log(`Előtöltés indítása: ${urlsToLoad.size} db kép...`);
        urlsToLoad.forEach(url => {
            const img = new Image();
            img.src = url;
        });
    })();

    let debugClicks = 0;
    const titleElement = document.querySelector('h1');

    if (titleElement) {
        titleElement.addEventListener('click', function() {
            debugClicks++;
            if (debugClicks >= 5) {
                checkAllImages(); 
                debugClicks = 0;
            }
            setTimeout(() => { debugClicks = 0; }, 1000);
        });
    }

</script>
